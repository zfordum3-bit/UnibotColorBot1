[aim]
bot_input_type = microcontroller_serial
screen_center_offset = 0

# Aim feel
aim_smoothing_factor = 0.80
speed = 0.70
x_speed_multiplier = 1.00
y_speed_multiplier = 0.98
target_prediction = 1.38

# Aim target: head, neck, body, or visible
aim_target_part = head

# Head height by target size. Higher values aim lower inside the detected head/top window.
aim_height_near = 0.18
aim_height_mid = 0.18
aim_height_far = 0.17

[communication]
com_port = 3

[screen]
group_close_target_blobs_threshold = 2, 2
upper_color = 162, 255, 255
lower_color = 132, 105, 135
capture_fov_x = 200
capture_fov_y = 200
# Aim FOV: change these two lines to resize the center-screen FOV circle.
# These values are radius-like screen pixels from the crosshair; smaller = narrower lock range.
aim_fov_x = 115
aim_fov_y = 115
max_loops_per_sec = 240
auto_detect_resolution = true
resolution_x = 1920
resolution_y = 1440

[recoil]
mode = move
recoil_x = 0.0
recoil_y = 35.0
max_offset = 100
recover = 0.0

[trigger]
trigger_delay = 0
trigger_randomization = 30
trigger_threshold = 8

[rapid_fire]
target_cps = 10

[key_binds]
key_reload_config = 0x70
key_toggle_aim = 0x71
key_toggle_recoil = 0x72
key_exit = 0x73
key_trigger = 0x02
key_rapid_fire = off
aim_keys = 0x06

[debug]
enabled = false
always_on = true
display_mode = mask
refresh_interval = 4
